  enable: true
  QR_code:
    - img: https://preview.cloud.189.cn/image/imageAction?param=92F674630011798BC1FF6CB815A4FCC02B209B7F7AC83CD19F4B0EA44BF578E8842C54BFE5D4A8D3AB72A0DCCDF4AD02B5BE18D4151F534D3F602AE6F48D7AAD19CE565B455BC0E4F3FE06A310E2AD1833F80DFEE3488CA66B06E0EFC11274F1CC3EA2B3AAE10E7B06E8C52479F7521533F91902
