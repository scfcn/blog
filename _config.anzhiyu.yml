# 文章顶部ai摘要
post_head_ai_description:
  enable: true
  gptName: SCFC
  mode: local # 默认模式 可选值: tianli/local
  switchBtn: false # 可以配置是否显示切换按钮 以切换tianli/local
  btnLink: https://afdian.net/item/886a79d4db6711eda42a52540025c377
  randomNum: 3 # 按钮最大的随机次数，也就是一篇文章最大随机出来几种
  basicWordCount: 1500 # 最低获取字符数, 最小1000, 最大1999
  key: 
  Referer: 

# 快捷键配置
shortcutKey:
  enable: false
  delay: 100 # 所有键位延时触发而不是立即触发（包括shift，以解决和浏览器键位冲突问题）
  shiftDelay: 200 # shift按下延时多久开启

# 无障碍优化（在首页按下「shift + ?」以查看效果）
accesskey:
  enable: false

# 友情链接顶部相关配置
linkPageTop:
  enable: true
  title: 与数百名博主无限进步
  # 添加博主友链的评论自定义格式
  addFriendPlaceholder: "昵称（请勿包含博客等字样）：\n网站地址（要求博客地址，请勿提交个人主页）：\n头像图片url（请提供尽可能清晰的图片，我会上传到我自己的图床）：\n描述：\n站点截图（可选）：\n"

# 缩略图后缀 archive/tag/category 页面单独开启后缀
pageThumbnailSuffix: ""

# 隐私协议弹窗
agreementPopup:
  enable: true
  url: /privacy

# 右键菜单
rightClickMenu:
  enable: true

# 首页随便逛逛people模式 而非技能点模式，关闭后为技能点模式需要配置
peoplecanvas:
  enable: false
  img: https://api.vvhan.com/api/bing?type=image&rand=sj

# 动效
dynamicEffect:
  postTopWave: true # 文章顶部波浪效果
  postTopRollZoomInfo: true # 文章顶部滚动时缩放
  pageCommentsRollZoom: true # 非文章页面评论滚动时缩放显示（仅仅Twikoo生效）

# Inject
# Insert the code to head (before '</head>' tag) and the bottom (before '</body>' tag)
# 插入代码到头部 </head> 之前 和 底部 </body> 之前
inject:
  head:
    # 自定义css
    - <link rel="stylesheet" href="/css/home.css"> # 首页文章卡片擦亮效果
    - <link rel="stylesheet" href="/css/custom/font.css">
    - <link rel="stylesheet" href="/css/custom.css">
    - <link rel="stylesheet" href="/css/progress_bar.css" media="defer" onload="this.media='all'"> 
    - <link rel="stylesheet" href="/css/custom.css">
    - <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Swiper/11.0.5/swiper-bundle.min.css" />

  bottom:
    - <script defer src="/js/cursor.js"></script>
    - <script src="/js/countdown.js"></script>
    - <script async src="//npm.elemecdn.com/pace-js@1.2.4/pace.min.js"></script>
    - <script src="/js/card-welcome.js"></script>
    - <script defer pjax src="/js/custom.js"></script>
    - <script src="https://cdnjs.cloudflare.com/ajax/libs/Swiper/11.0.5/swiper-bundle.min.js"></script>
  # FPS显示
    - <span id="fps"></span> 
    - <link rel="stylesheet" href="/custom/fps/fps.css" media="defer" onload="this.media='all'">
    - <script src="/custom/fps/fps.js"></script>
  # 公祭日和节日弹框
    - <script defer type="text/javascript" src="/custom/dayalert/sweetalert2.all.js"></script> # 节日弹窗依赖
    - <script defer src="/custom/dayalert/lunar.js"></script> # 农历计算
    - <script defer src="/custom/dayalert/day.js"></script> # 节日弹窗

